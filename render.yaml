services:
  # --- Unified VulnVault Service (Frontend + Backend) ---
  - type: web
    name: vulnvault-app
    runtime: docker
    region: oregon
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile

    # Docker build args (needed for Vite to bake env vars into frontend)
    dockerBuildArgs:
      VITE_API_URL: https://vulnvault-app.onrender.com
      VITE_CLERK_PUBLISHABLE_KEY: pk_test_ZmxleGlibGUtYmx1ZWpheS0yOC5jbGVyay5hY2NvdW50cy5kZXYk

    # --- Environment Variables (runtime) ---
    envVars:
      # Database
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: "vulnvault"
      
      # AI & Authentication
      - key: GEMINI_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      
      # Email Alerts (Optional)
      - key: EMAIL_ENABLED
        value: "false" 
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false

      # Python
      - key: PYTHONUNBUFFERED
        value: "1"